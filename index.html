<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3rd NATIONAL OPEN TEAM CHESS CHAMPIONSHIP 2026 - PMX Trophy</title>
  <!-- 📦 High-performance HTML5 Barcode/QR Engine Included via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Arial;
      text-align: center;
      background: #eef3fb;
      padding: 20px;
    }
    h2 { color: #003366; margin-bottom: 5px; }
    h4 { color: #555; margin-top: 0; margin-bottom: 20px; }
    button {
      padding: 14px 28px;
      font-size: 1.1em;
      border-radius: 10px;
      border: none;
      background: #0057e7;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      margin-bottom: 15px;
    }
    button:disabled { background: #ccc; cursor: not-allowed; }
    
    .scanner-container {
      margin: 10px auto;
      max-width: 360px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      background: #000;
      display: none;
    }
    #reader { width: 100%; }

    .card {
      margin-top: 15px;
      background: white;
      padding: 25px;
      border-radius: 15px;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      min-width: 320px;
      text-align: left;
    }
    .profile-container {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }
    .profile {
      width: 100px; height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 15px;
    }
    .flag {
      width: 40px; height: 30px;
      vertical-align: middle;
      margin-left: 8px;
      border-radius: 4px;
    }
    .status {
      font-size: 2em;
      font-weight: bold;
      margin-top: 15px;
      text-align: center;
    }
    .in { color: green; }
    .out { color: red; }

    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #0057e7;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(3600deg); }
    }
    .logo { width: 120px; margin-bottom: 10px; }

    /* 🛠️ Debug Box Styling */
    .debug-box {
      margin: 20px auto;
      max-width: 360px;
      background: #333;
      color: #00ff00;
      padding: 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.85em;
      text-align: left;
      overflow-x: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <img class="logo" src="https://i.postimg.cc/fLf608pp/Asset-1-2x-Copy.png" alt="App Logo">
  <h2>3rd NATIONAL OPEN TEAM CHESS CHAMPIONSHIP 2026</h2>
  <h4>PMX Trophy — Toilet Check</h4>
  
  <button id="scanBtn">Start Barcode Scanner</button>

  <div class="scanner-container" id="scannerContainer">
    <div id="reader"></div>
  </div>

  <div class="spinner" id="spinner"></div>

  <div id="result" class="card" style="display:none;">
    <div class="profile-container">
      <img id="profile" class="profile" src="" alt="Profile Picture">
      <h3 id="name"></h3>
    </div>
    <p>
      <b>User ID:</b> <span id="uid"></span><br>
      <b>Nationality:</b> <span id="nat"></span>
      <img id="flag" class="flag" src="" alt="Flag"><br>
      <b>Category:</b> <span id="cat"></span><br>
      <b>Time:</b> <span id="time"></span>
    </p>
    <p class="status" id="status"></p>
    <p id="duration" style="text-align:center; font-size:1.1em; color:#333;"></p>
  </div>

  <!-- 🛠️ Diagnostic Console Window -->
  <div class="debug-box" id="debugConsole">Console initialized. Waiting for scan...</div>

  <script>
    // ⚠️ CRITICAL: Replace this string with your LATEST Web App URL from Apps Script!
    const API_URL = "https://script.google.com/macros/s/AKfycby0nEGKDbVbokbMK8jZTkQv7PhC-scO5Yb1ZIoTg1P_-OimV7t3ghNPmO38XRo_Chqr/exec";
    
    const scanBtn = document.getElementById('scanBtn');
    const spinner = document.getElementById('spinner');
    const resultDiv = document.getElementById('result');
    const scannerContainer = document.getElementById('scannerContainer');
    const debugConsole = document.getElementById('debugConsole');

    let html5QrcodeScanner = null;
    let lastScanId = "";
    let lastScanTime = 0;
    let resetTimer = null;

    function logToScreen(message) {
      debugConsole.innerText = `[${new Date().toLocaleTimeString()}] ${message}`;
    }

    function onScanSuccess(decodedText, decodedResult) {
      const userId = decodedText.trim();
      const now = Date.now();

      if (userId === lastScanId && now - lastScanTime < 5000) {
        return;
      }

      lastScanId = userId;
      lastScanTime = now;

      spinner.style.display = "block";
      resultDiv.style.display = "none";

      logToScreen(`Scanned ID: "${userId}". Fetching data...`);
      getUserData(userId);
    }

    function startScan() {
      scannerContainer.style.display = "block";
      scanBtn.innerText = "Scanner Running...";
      scanBtn.disabled = true;

      html5QrcodeScanner = new Html5Qrcode("reader");
      const config = { fps: 15, qrbox: { width: 280, height: 160 }, aspectRatio: 1.0 };

      html5QrcodeScanner.start(
        { facingMode: "environment" }, 
        config, 
        onScanSuccess,
        (errorMessage) => {}
      ).catch(err => {
        logToScreen(`Camera Error: ${err.message}`);
        stopScan();
      });
    }

    async function getUserData(userId) {
      try {
        const fullUrl = `${API_URL}?userId=${encodeURIComponent(userId)}`;
        logToScreen(`Sending GET to: ${fullUrl.substring(0, 60)}...`);

        const res = await fetch(fullUrl, {
          method: "GET",
          redirect: "follow"
        });

        logToScreen(`Response received. Status: ${res.status}`);

        const textData = await res.text();
        logToScreen(`Raw content length: ${textData.length} chars.`);

        // Parse JSON manually to intercept plain-text engine execution blocks
        const data = JSON.parse(textData);
        
        if (data.error) {
          logToScreen(`Application Error: ${data.error}`);
          alert(`Error: ${data.error}`);
          return;
        }

        logToScreen(`Success! Displaying card for ${data.name}`);
        showResult(data);
      } catch (err) { 
        logToScreen(`Execution Failure: ${err.name} - ${err.message}`);
      } finally {
        spinner.style.display = "none";
      }
    }

    function showResult(data) {
      resultDiv.style.display = "block";
      document.getElementById("name").innerText = data.name;
      document.getElementById("uid").innerText = data.id;
      document.getElementById("nat").innerText = data.nationality;
      document.getElementById("flag").src = data.flag || "";
      document.getElementById("cat").innerText = data.category;
      document.getElementById("time").innerText = data.time;
      document.getElementById("status").innerText = data.status;
      document.getElementById("status").className = "status " + (data.status === "In" ? "in" : "out");
      document.getElementById("profile").src = data.profile || "";

      if (data.status === "Out" && data.duration) {
        document.getElementById("duration").innerText = `Duration: ${data.duration}`;
        const durationParts = data.duration.split(/[ms ]/).filter(Boolean);
        const minutes = parseInt(durationParts[0]) || 0;
        resultDiv.style.background = (minutes >= 5) ? "#ffcccc" : "white";
      } else {
        document.getElementById("duration").innerText = "";
        resultDiv.style.background = "white";
      }

      if (resetTimer) clearTimeout(resetTimer);
      resetTimer = setTimeout(() => {
        resultDiv.style.display = "none";
        ["name","uid","nat","cat","time","status"].forEach(id => document.getElementById(id).innerText = "");
        document.getElementById("flag").src = "";
        document.getElementById("profile").src = "";
        document.getElementById("duration").innerText = "";
        resultDiv.style.background = "white";
        logToScreen("Screen auto-reset complete. Ready for next scan.");
      }, 5000);
    }

    scanBtn.addEventListener("click", startScan);
  </script>
</body>
</html>
