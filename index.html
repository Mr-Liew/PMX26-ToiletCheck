<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3rd NATIONAL OPEN TEAM CHESS CHAMPIONSHIP 2026 - PMX Trophy</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial;
      text-align: center;
      background: #eef3fb;
      padding: 20px;
    }
    h2 { color: #003366; margin-bottom: 5px; }
    h4 { color: #555; margin-top: 0; margin-bottom: 20px; }
    button {
      padding: 14px 28px;
      font-size: 1.1em;
      border-radius: 10px;
      border: none;
      background: #0057e7;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      margin-bottom: 15px;
    }
    button:disabled { background: #ccc; cursor: not-allowed; }
    
    /* Camera Preview Styling */
    .video-container {
      margin: 10px auto;
      max-width: 360px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      background: #000;
      display: none;
    }
    video {
      width: 100%;
      height: auto;
      display: block;
    }

    .card {
      margin-top: 15px;
      background: white;
      padding: 25px;
      border-radius: 15px;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      min-width: 320px;
      text-align: left;
    }
    .profile-container {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }
    .profile {
      width: 100px; height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 15px;
    }
    .flag {
      width: 40px; height: 30px;
      vertical-align: middle;
      margin-left: 8px;
      border-radius: 4px;
    }
    .status {
      font-size: 2em;
      font-weight: bold;
      margin-top: 15px;
      text-align: center;
    }
    .in { color: green; }
    .out { color: red; }

    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #0057e7;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .logo {
      width: 120px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <!-- 🏆 App Logo -->
  <img class="logo" src="https://i.postimg.cc/fLf608pp/Asset-1-2x-Copy.png" alt="App Logo">

  <h2>3rd NATIONAL OPEN TEAM CHESS CHAMPIONSHIP 2026</h2>
  <h4>PMX Trophy — Toilet Check</h4>
  
  <button id="scanBtn">Start Barcode Scanner</button>

  <!-- 📸 Live Camera Preview Feed -->
  <div class="video-container" id="videoContainer">
    <video id="video" autoplay playsinline muted></video>
  </div>

  <div class="spinner" id="spinner"></div>

  <div id="result" class="card" style="display:none;">
    <div class="profile-container">
      <img id="profile" class="profile" src="" alt="Profile Picture">
      <h3 id="name"></h3>
    </div>
    <p>
      <b>User ID:</b> <span id="uid"></span><br>
      <b>Nationality:</b> <span id="nat"></span>
      <img id="flag" class="flag" src="" alt="Flag"><br>
      <b>Category:</b> <span id="cat"></span><br>
      <b>Time:</b> <span id="time"></span>
    </p>
    <p class="status" id="status"></p>
    <p id="duration" style="text-align:center; font-size:1.1em; color:#333;"></p>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwmFvw0WSKSYbrSjN3egFHmirf2P82VLxieQWw6bNBM8jaDZV-xxQ4cyXniq9ROsN72/exec";
    const scanBtn = document.getElementById('scanBtn');
    const spinner = document.getElementById('spinner');
    const resultDiv = document.getElementById('result');
    const videoElement = document.getElementById('video');
    const videoContainer = document.getElementById('videoContainer');

    let lastScanId = "";
    let lastScanTime = 0;
    let resetTimer = null;
    let stream = null;
    let scanningActive = false;

    async function startScan() {
      // Check browser compatibility for BarcodeDetector API
      if (!("BarcodeDetector" in window)) {
        alert("⚠️ Barcode Detection API is not supported on this browser/device. Please use Google Chrome on Android/Windows or ensure HTTPS is active.");
        return;
      }

      if (scanningActive) return; // Prevent multiple streams

      try {
        // Request back camera access
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { exact: "environment" } }
        }).catch(() => {
          // Fallback to any available camera if exact back camera fails
          return navigator.mediaDevices.getUserMedia({ video: true });
        });

        videoElement.srcObject = stream;
        videoContainer.style.display = "block";
        scanBtn.innerText = "Scanner Active...";
        scanBtn.disabled = true;
        scanningActive = true;

        // Initialize Detector (Supports common barcode types including Code 128, QR Codes, EAN, etc.)
        const formats = await BarcodeDetector.getSupportedFormats();
        const barcodeDetector = new BarcodeDetector({ formats: formats });

        // Continuous processing loop
        function renderLoop() {
          if (!scanningActive) return;

          if (videoElement.readyState === videoElement.HAVE_CURRENT_DATA) {
            barcodeDetector.detect(videoElement)
              .then(barcodes => {
                if (barcodes.length > 0) {
                  const userId = barcodes[0].rawValue.trim();
                  const now = Date.now();

                  // 5-second anti-spam delay for identical scans
                  if (userId === lastScanId && now - lastScanTime < 5000) {
                    requestAnimationFrame(renderLoop);
                    return;
                  }

                  lastScanId = userId;
                  lastScanTime = now;

                  spinner.style.display = "block";
                  resultDiv.style.display = "none";

                  getUserData(userId);
                }
                requestAnimationFrame(renderLoop);
              })
              .catch(err => {
                console.error("Detection error:", err);
                requestAnimationFrame(renderLoop);
              });
          } else {
            requestAnimationFrame(renderLoop);
          }
        }

        requestAnimationFrame(renderLoop);

      } catch (err) {
        alert("Camera Access Error: " + err);
        stopCamera();
      }
    }

    function stopCamera() {
      scanningActive = false;
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
      videoContainer.style.display = "none";
      scanBtn.innerText = "Start Barcode Scanner";
      scanBtn.disabled = false;
    }

    async function getUserData(userId) {
      try {
        const res = await fetch(`${API_URL}?userId=${encodeURIComponent(userId)}`);
        const data = await res.json();
        showResult(data);
      } catch (err) { 
        alert("Fetch error: " + err); 
      } finally {
        spinner.style.display = "none";
      }
    }

    function showResult(data) {
      if (data.error) { alert(data.error); return; }

      resultDiv.style.display = "block";
      document.getElementById("name").innerText = data.name;
      document.getElementById("uid").innerText = data.id;
      document.getElementById("nat").innerText = data.nationality;
      document.getElementById("flag").src = data.flag || "";
      document.getElementById("cat").innerText = data.category;
      document.getElementById("time").innerText = data.time;
      document.getElementById("status").innerText = data.status;
      document.getElementById("status").className = "status " + (data.status === "In" ? "in" : "out");
      document.getElementById("profile").src = data.profile || "";

      // Duration display logic (light red background warning if >= 5 minutes)
      if (data.status === "Out" && data.duration) {
        document.getElementById("duration").innerText = `Duration: ${data.duration}`;

        const durationParts = data.duration.split(/[ms ]/).filter(Boolean);
        const minutes = parseInt(durationParts[0]) || 0;
        if (minutes >= 5) {
          resultDiv.style.background = "#ffcccc"; 
        } else {
          resultDiv.style.background = "white";
        }
      } else {
        document.getElementById("duration").innerText = "";
        resultDiv.style.background = "white";
      }

      // Auto-reset after 5 seconds
      if (resetTimer) clearTimeout(resetTimer);
      resetTimer = setTimeout(() => {
        resultDiv.style.display = "none";
        ["name","uid","nat","cat","time","status"].forEach(id => document.getElementById(id).innerText = "");
        document.getElementById("flag").src = "";
        document.getElementById("profile").src = "";
        document.getElementById("duration").innerText = "";
        resultDiv.style.background = "white";
      }, 5000);
    }

    scanBtn.addEventListener("click", startScan);
  </script>
</body>
</html>
