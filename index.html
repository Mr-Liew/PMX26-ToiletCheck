<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3rd NATIONAL OPEN TEAM CHESS CHAMPIONSHIP 2026 - PMX Trophy</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Arial;
      text-align: center;
      background: #eef3fb;
      padding: 20px;
    }
    h2 { color: #003366; margin-bottom: 5px; }
    h4 { color: #555; margin-top: 0; margin-bottom: 20px; }
    button {
      padding: 14px 28px;
      font-size: 1.1em;
      border-radius: 10px;
      border: none;
      background: #0057e7;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      margin-bottom: 15px;
    }
    button:disabled { background: #ccc; cursor: not-allowed; }
    
    /* Optimized Live Scan Scanner Box Layout */
    .scanner-container {
      margin: 10px auto;
      max-width: 360px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      background: #000;
      display: none;
    }
    #reader {
      width: 100%;
    }

    .card {
      margin-top: 15px;
      background: white;
      padding: 25px;
      border-radius: 15px;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      min-width: 320px;
      text-align: left;
    }
    .profile-container {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }
    .profile {
      width: 100px; height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 15px;
    }
    .flag {
      width: 40px; height: 30px;
      vertical-align: middle;
      margin-left: 8px;
      border-radius: 4px;
    }
    .status {
      font-size: 2em;
      font-weight: bold;
      margin-top: 15px;
      text-align: center;
    }
    .in { color: green; }
    .out { color: red; }

    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #0057e7;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(3600deg); }
    }
    .logo {
      width: 120px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <img class="logo" src="https://i.postimg.cc/fLf608pp/Asset-1-2x-Copy.png" alt="App Logo">
  <h2>3rd NATIONAL OPEN TEAM CHESS CHAMPIONSHIP 2026</h2>
  <h4>PMX Trophy — Toilet Check</h4>
  
  <button id="scanBtn">Start Barcode Scanner</button>

  <div class="scanner-container" id="scannerContainer">
    <div id="reader"></div>
  </div>

  <div class="spinner" id="spinner"></div>

  <div id="result" class="card" style="display:none;">
    <div class="profile-container">
      <img id="profile" class="profile" src="" alt="Profile Picture">
      <h3 id="name"></h3>
    </div>
    <p>
      <b>User ID:</b> <span id="uid"></span><br>
      <b>Nationality:</b> <span id="nat"></span>
      <img id="flag" class="flag" src="" alt="Flag"><br>
      <b>Category:</b> <span id="cat"></span><br>
      <b>Time:</b> <span id="time"></span>
    </p>
    <p class="status" id="status"></p>
    <p id="duration" style="text-align:center; font-size:1.1em; color:#333;"></p>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyDV5MkyTWQPOcgPtr079tHVafVuH1CuIU3CZoJKJXa67hdwOF4hF1lnP_HlZiLiEWh/exec";
    const scanBtn = document.getElementById('scanBtn');
    const spinner = document.getElementById('spinner');
    const resultDiv = document.getElementById('result');
    const scannerContainer = document.getElementById('scannerContainer');

    let html5QrcodeScanner = null;
    let lastScanId = "";
    let lastScanTime = 0;
    let resetTimer = null;

    function onScanSuccess(decodedText, decodedResult) {
      const userId = decodedText.trim();
      const now = Date.now();

      // Prevent processing the exact same barcode multiple times within 5 seconds
      if (userId === lastScanId && now - lastScanTime < 5000) {
        return;
      }

      lastScanId = userId;
      lastScanTime = now;

      // Visual feedback updates
      spinner.style.display = "block";
      resultDiv.style.display = "none";

      // Execute backend API request
      async function getUserData(userId) {
  try {
    // 🛠️ FIX: Added mode and redirect configurations to prevent mobile fetch dropouts
    const res = await fetch(`${API_URL}?userId=${encodeURIComponent(userId)}`, {
      method: "GET",
      mode: "cors",
      redirect: "follow"
    });

    if (!res.ok) {
      throw new Error(`HTTP error! Status: ${res.status}`);
    }

    const data = await res.json();
    showResult(data);
  } catch (err) { 
    console.error("Fetch full error log:", err);
    alert("Connection Error! Please check your deployment settings or check your Web App URL."); 
  } finally {
    spinner.style.display = "none";
  }
}
    }

    function startScan() {
      scannerContainer.style.display = "block";
      scanBtn.innerText = "Scanner Running...";
      scanBtn.disabled = true;

      // Instantiate HTML5 QR Code / Barcode Decoder
      html5QrcodeScanner = new Html5Qrcode("reader");

      // Configure setup for standard badges (Looks for 1D Barcodes + QR codes)
      const config = { 
        fps: 15, 
        qrbox: { width: 280, height: 160 }, // Landscape configuration structured for standard barcodes
        aspectRatio: 1.0 
      };

      html5QrcodeScanner.start(
        { facingMode: "environment" }, 
        config, 
        onScanSuccess,
        (errorMessage) => {
          // Silent catch for live video stream frame parsing failures
        }
      ).catch(err => {
        alert("Camera Initialization Error: " + err);
        stopScan();
      });
    }

    function stopScan() {
      if (html5QrcodeScanner) {
        html5QrcodeScanner.stop().then(() => {
          scannerContainer.style.display = "none";
          scanBtn.innerText = "Start Barcode Scanner";
          scanBtn.disabled = false;
        }).catch(err => console.error("Error stopping engine:", err));
      }
    }

    async function getUserData(userId) {
      try {
        const res = await fetch(`${API_URL}?userId=${encodeURIComponent(userId)}`);
        const data = await res.json();
        showResult(data);
      } catch (err) { 
        alert("Fetch error: " + err); 
      } finally {
        spinner.style.display = "none";
      }
    }

    function showResult(data) {
      if (data.error) { alert(data.error); return; }

      resultDiv.style.display = "block";
      document.getElementById("name").innerText = data.name;
      document.getElementById("uid").innerText = data.id;
      document.getElementById("nat").innerText = data.nationality;
      document.getElementById("flag").src = data.flag || "";
      document.getElementById("cat").innerText = data.category;
      document.getElementById("time").innerText = data.time;
      document.getElementById("status").innerText = data.status;
      document.getElementById("status").className = "status " + (data.status === "In" ? "in" : "out");
      document.getElementById("profile").src = data.profile || "";

      // Evaluation rules for duration logic (light red warning if away >= 5 mins)
      if (data.status === "Out" && data.duration) {
        document.getElementById("duration").innerText = `Duration: ${data.duration}`;

        const durationParts = data.duration.split(/[ms ]/).filter(Boolean);
        const minutes = parseInt(durationParts[0]) || 0;
        if (minutes >= 5) {
          resultDiv.style.background = "#ffcccc"; 
        } else {
          resultDiv.style.background = "white";
        }
      } else {
        document.getElementById("duration").innerText = "";
        resultDiv.style.background = "white";
      }

      // Automatically reset card info back to hidden after 5 seconds
      if (resetTimer) clearTimeout(resetTimer);
      resetTimer = setTimeout(() => {
        resultDiv.style.display = "none";
        ["name","uid","nat","cat","time","status"].forEach(id => document.getElementById(id).innerText = "");
        document.getElementById("flag").src = "";
        document.getElementById("profile").src = "";
        document.getElementById("duration").innerText = "";
        resultDiv.style.background = "white";
      }, 5000);
    }

    scanBtn.addEventListener("click", startScan);
  </script>
</body>
</html>
