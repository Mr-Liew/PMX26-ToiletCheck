<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3rd NATIONAL OPEN TEAM CHESS CHAMPIONSHIP 2026 - PMX Trophy</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Arial;
      text-align: center;
      background: #eef3fb;
      padding: 20px;
    }
    h2 { color: #003366; margin-bottom: 5px; }
    h4 { color: #555; margin-top: 0; margin-bottom: 20px; }
    
    button {
      padding: 14px 28px;
      font-size: 1.1em;
      border-radius: 10px;
      border: none;
      background: #0057e7;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      margin-bottom: 15px;
      font-weight: bold;
    }
    button:disabled { background: #ccc; cursor: not-allowed; }
    
    /* 📐 The Scale Fix: Clamps the outer space used by the scanner on your layout */
    .scanner-outer-wrapper {
      margin: 10px auto;
      max-width: 340px;
      height: 190px; /* Force a low-profile footprint on the page layout */
      overflow: hidden;
      position: relative;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      display: none;
    }

    /* Shrinks the internal rendering engine scale uniformly so the line stays centered and uncut */
    .scanner-container {
      width: 100%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.75); /* Zoomed out slightly to fit everything cleanly */
      background: #000;
    }
    
    #reader { 
      width: 100%; 
    }

    .card {
      margin-top: 15px;
      background: white;
      padding: 25px;
      border-radius: 15px;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
      min-width: 320px;
      text-align: left;
    }
    .card h3 {
      margin-top: 0;
      color: #003366;
      font-size: 1.4em;
      border-bottom: 2px solid #eef3fb;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .card p {
      line-height: 1.6;
      font-size: 1.05em;
      margin: 5px 0;
    }

    .status {
      font-size: 2.2em;
      font-weight: bold;
      margin-top: 15px;
      text-align: center;
    }
    .in { color: green; }
    .out { color: red; }

    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #0057e7;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <h2>3rd NATIONAL OPEN TEAM CHESS CHAMPIONSHIP 2026</h2>
  <h4>PMX Trophy — Toilet Check</h4>
  
  <button id="scanBtn">Start Barcode Scanner</button>

  <div class="scanner-outer-wrapper" id="scannerWrapper">
    <div class="scanner-container">
      <div id="reader"></div>
    </div>
  </div>

  <div class="spinner" id="spinner"></div>

  <div id="result" class="card" style="display:none;">
    <h3 id="name"></h3>
    <p><b>User ID:</b> <span id="uid"></span></p>
    <p><b>Team Name:</b> <span id="nat"></span></p>
    <p><b>Time:</b> <span id="time"></span></p>
    
    <p class="status" id="status"></p>
    <p id="duration" style="text-align:center; font-size:1.15em; font-weight: bold; color:#333; margin-top: 10px;"></p>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycby0nEGKDbVbokbMK8jZTkQv7PhC-scO5Yb1ZIoTg1P_-OimV7t3ghNPmO38XRo_Chqr/exec";
    
    const scanBtn = document.getElementById('scanBtn');
    const spinner = document.getElementById('spinner');
    const resultDiv = document.getElementById('result');
    const scannerWrapper = document.getElementById('scannerWrapper');

    let html5QrcodeScanner = null;
    let lastScanId = "";
    let lastScanTime = 0;
    let resetTimer = null;

    function onScanSuccess(decodedText, decodedResult) {
      const userId = decodedText.trim();
      const now = Date.now();

      if (userId === lastScanId && now - lastScanTime < 5000) {
        return;
      }

      lastScanId = userId;
      lastScanTime = now;

      spinner.style.display = "block";
      resultDiv.style.display = "none";

      getUserData(userId);
    }

    function startScan() {
      scannerWrapper.style.display = "block";
      scanBtn.innerText = "Scanner Active";
      scanBtn.disabled = true;

      html5QrcodeScanner = new Html5Qrcode("reader");
      
      const config = { 
        fps: 20, 
        qrbox: { width: 250, height: 110 }, // Generous scan target frame size
        aspectRatio: 1.333333 // Standard robust camera aspect ratio framework
      };

      html5QrcodeScanner.start(
        { facingMode: "environment" }, 
        config, 
        onScanSuccess,
        (errorMessage) => {}
      ).catch(err => {
        alert("Camera Access Error: " + err);
        stopScan();
      });
    }

    function stopScan() {
      if (html5QrcodeScanner) {
        html5QrcodeScanner.stop().then(() => {
          scannerWrapper.style.display = "none";
          scanBtn.innerText = "Start Barcode Scanner";
          scanBtn.disabled = false;
        }).catch(err => console.error("Error shutting down camera module.", err));
      }
    }

    async function getUserData(userId) {
      try {
        const res = await fetch(`${API_URL}?userId=${encodeURIComponent(userId)}`, {
          method: "GET",
          redirect: "follow"
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        
        if (data.error) {
          alert(`System Notification: ${data.error}`);
          return;
        }

        showResult(data);
      } catch (err) { 
        alert("Data Transfer Error: Could not fetch information from spreadsheet.");
      } finally {
        spinner.style.display = "none";
      }
    }

    function showResult(data) {
      resultDiv.style.display = "block";
      
      document.getElementById("name").innerText = data.name;
      document.getElementById("uid").innerText = data.id;
      document.getElementById("nat").innerText = data.nationality; 
      document.getElementById("time").innerText = data.time;
      document.getElementById("status").innerText = data.status;
      document.getElementById("status").className = "status " + (data.status === "In" ? "in" : "out");

      if (data.status === "Out" && data.duration) {
        document.getElementById("duration").innerText = `Duration Away: ${data.duration}`;
        const durationParts = data.duration.split(/[ms ]/).filter(Boolean);
        const minutes = parseInt(durationParts[0]) || 0;
        resultDiv.style.background = (minutes >= 5) ? "#ffcccc" : "white";
      } else {
        document.getElementById("duration").innerText = "";
        resultDiv.style.background = "white";
      }

      if (resetTimer) clearTimeout(resetTimer);
      resetTimer = setTimeout(() => {
        resultDiv.style.display = "none";
        ["name","uid","nat","time","status","duration"].forEach(id => document.getElementById(id).innerText = "");
        resultDiv.style.background = "white";
      }, 5000);
    }

    scanBtn.addEventListener("click", startScan);
  </script>
</body>
</html>
